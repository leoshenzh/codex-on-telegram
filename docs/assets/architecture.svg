<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Architecture: Telegram to Bridge daemon to Claude Code or OpenAI Codex to your local project">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="aaccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="url(#abg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#aaccent)"/>

  <!-- Title -->
  <text x="600" y="56" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">How it works</text>

  <!-- Box layout: 4 boxes, width 232, gap ~38, vertically centered around y=180 -->
  <!-- Box 1: Telegram -->
  <g>
    <rect x="40" y="138" width="220" height="104" rx="16" fill="#11182f" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="186" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#e2e8f0">Telegram</text>
    <text x="150" y="214" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8">you, on any device</text>
  </g>

  <!-- Box 2: Bridge daemon -->
  <g>
    <rect x="312" y="138" width="248" height="104" rx="16" fill="#171a3a" stroke="#818cf8" stroke-width="2.5"/>
    <text x="436" y="180" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">Bridge daemon</text>
    <text x="436" y="208" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a5b4fc">this repo</text>
  </g>

  <!-- Box 3: Claude Code / OpenAI Codex -->
  <g>
    <rect x="612" y="138" width="248" height="104" rx="16" fill="#11182f" stroke="#38bdf8" stroke-width="2"/>
    <text x="736" y="180" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#e2e8f0">Claude Code /</text>
    <text x="736" y="208" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#e2e8f0">OpenAI Codex</text>
  </g>

  <!-- Box 4: Your local project -->
  <g>
    <rect x="912" y="138" width="248" height="104" rx="16" fill="#11182f" stroke="#38bdf8" stroke-width="2"/>
    <text x="1036" y="180" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">Your local</text>
    <text x="1036" y="208" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">project</text>
  </g>

  <!-- Arrows -->
  <line x1="262" y1="190" x2="308" y2="190" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="562" y1="190" x2="608" y2="190" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="862" y1="190" x2="908" y2="190" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Annotation labels under Bridge daemon -->
  <g font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="500">
    <g>
      <rect x="300" y="266" width="124" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.25"/>
      <text x="362" y="287" text-anchor="middle" fill="#cbd5e1">session routing</text>
    </g>
    <g>
      <rect x="432" y="266" width="100" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.25"/>
      <text x="482" y="287" text-anchor="middle" fill="#cbd5e1">watchdogs</text>
    </g>
    <g>
      <rect x="300" y="306" width="232" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.25"/>
      <text x="416" y="327" text-anchor="middle" fill="#cbd5e1">crash-safe persistence</text>
    </g>
  </g>
</svg>
