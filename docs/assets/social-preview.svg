<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Codex on Telegram — Drive your local Claude Code and OpenAI Codex coding sessions from Telegram">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#16204a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="saccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#sbg)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#saccent)"/>

  <!-- decorative grid dots, top-right and bottom-left -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="1120" cy="90" r="4"/>
    <circle cx="1170" cy="90" r="4"/>
    <circle cx="1220" cy="90" r="4"/>
    <circle cx="1120" cy="140" r="4"/>
    <circle cx="1170" cy="140" r="4"/>
    <circle cx="1220" cy="140" r="4"/>
    <circle cx="60" cy="500" r="4"/>
    <circle cx="110" cy="500" r="4"/>
    <circle cx="60" cy="550" r="4"/>
    <circle cx="110" cy="550" r="4"/>
  </g>

  <!-- Glyph: chat bubble + terminal prompt, centered above title -->
  <g transform="translate(576,150)">
    <rect x="0" y="0" width="128" height="96" rx="20" fill="#0b1220" stroke="url(#saccent)" stroke-width="3"/>
    <path d="M 26 96 L 26 124 L 54 96 Z" fill="#0b1220" stroke="url(#saccent)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 30 38 L 52 56 L 30 74" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="64" y1="74" x2="98" y2="74" stroke="#818cf8" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="380" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="82" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">Codex on Telegram</text>

  <!-- Tagline -->
  <text x="640" y="436" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#a5b4fc">Drive your local Claude Code &amp; OpenAI Codex coding</text>
  <text x="640" y="474" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#a5b4fc">sessions from Telegram.</text>

  <!-- Pills, centered -->
  <g font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600">
    <g>
      <rect x="452" y="520" width="128" height="48" rx="24" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="516" y="551" fill="#e2e8f0" text-anchor="middle">Claude</text>
    </g>
    <g>
      <rect x="596" y="520" width="120" height="48" rx="24" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="656" y="551" fill="#e2e8f0" text-anchor="middle">Codex</text>
    </g>
    <g>
      <rect x="732" y="520" width="146" height="48" rx="24" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="805" y="551" fill="#e2e8f0" text-anchor="middle">Telegram</text>
    </g>
  </g>
</svg>
